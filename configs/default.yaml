# Default hyperparameters for PSTG with Conditional Causal Graph
# Following PSTG (Entropy 2026) experimental setup

model:
  patch_sizes: [25, 50, 125]       # Multi-scale patch sizes P
  main_patch_size: 25              # Primary patch size p_main
  d_model: 512                     # Model dimension D
  n_heads: 4                       # Number of attention heads H
  n_layers: 2                      # Number of progressive reasoning layers n_L
  sparsity_ratio: 0.1              # Top-k sparsification ratio gamma
  dropout: 0.1                     # Dropout rate
  ffn_dropout: 0.21                # FFN dropout rate

  # Conditional causal graph (patent innovation)
  use_conditional_causal: true     # Enable conditional Granger causality
  causal_hidden_dim: 256           # Hidden dim for causal estimator
  causal_lag: 5                    # Lag order for Granger causality test

training:
  learning_rate: 5.0e-4
  weight_decay: 4.0e-4
  T_max: 70                        # Cosine annealing T_max
  eta_min: 0                       # Cosine annealing eta_min
  batch_size: 64
  epochs: 50

data:
  window_length: 250               # Sliding window length L
  prediction_length: 10            # Prediction horizon F
  stride: 1

anomaly_detection:
  smoothing_base: 30               # n_s: smoothing base factor
  test_batch_size: 70              # B_s: test batch size
  tuning_percentage: 0.05          # p_s: tuning percentage
