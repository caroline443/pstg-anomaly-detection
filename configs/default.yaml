# PSTG with Conditional Causal Graph
# A4000 16GB — joint training config
# d_model=256, batch=64 (joint loader has many more windows, can afford larger batch)

model:
  patch_sizes: [25, 50, 125]
  main_patch_size: 25
  d_model: 256
  n_heads: 4
  n_layers: 2
  sparsity_ratio: 0.1
  dropout: 0.1
  ffn_dropout: 0.21
  use_conditional_causal: true
  causal_hidden_dim: 128
  causal_lag: 5

training:
  learning_rate: 5.0e-4
  weight_decay: 4.0e-4
  T_max: 100
  eta_min: 1.0e-6
  # Joint mode: larger batch is fine because the merged dataset is much bigger
  # Single mode: keep at 24 to avoid OOM on small per-entity datasets
  batch_size: 64
  epochs: 50

data:
  window_length: 250
  prediction_length: 10
  stride: 3

anomaly_detection:
  smoothing_base: 30
  test_batch_size: 64
  tuning_percentage: 0.05      # fallback when use_adaptive=false
  use_adaptive: true           # calibrate threshold per entity from train errors
